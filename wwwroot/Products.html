<!DOCTYPE html>
<html>
<head>

    <title>Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center">

        <h2 class="text-primary fw-bold">
            Product Inventory Management
        </h2>

        <div>

            <span class="me-3">
                Welcome,
                <strong id="username"></strong>
                (<span id="role"></span>)
            </span>

            <button class="btn btn-danger"
                    onclick="logout()">
                Logout
            </button>

        </div>

    </div>

    <hr>

    <!-- Product Form -->
    <!-- SuperAdmin: always visible (add + edit).
         Admin: hidden until they click Edit on a row, then shown pre-filled.
         Everyone else: never shown. -->

    <div class="card shadow p-4 mb-4" id="addProductCard">

        <h4 id="formTitle">Add / Update Product</h4>

        <input type="hidden" id="productId"/>

        <div class="row mt-3">

            <div class="col-md-3">
                <input type="text" class="form-control" id="name" placeholder="Product Name">
            </div>

            <div class="col-md-3">
                <input type="text" class="form-control" id="category" placeholder="Category">
            </div>

            <div class="col-md-2">
                <input type="number" class="form-control" id="price" placeholder="Price">
            </div>

            <div class="col-md-2">
                <input type="number" class="form-control" id="quantity" placeholder="Quantity">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100" id="btnSave" onclick="saveProduct()">
                    Save Product
                </button>
            </div>

        </div>

    </div>

    <!-- Product Table -->
    <table class="table table-hover table-bordered shadow">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Quantity</th>
            <th width="220">Actions</th>
        </tr>
        </thead>

        <tbody id="products">
        </tbody>

    </table>

</div>

<script>

let userRole = "";
let allProducts = [];

$(document).ready(function () {

    getCurrentUser();
});

// Escapes text before inserting into HTML, so a product name like
// <script> can't run in the page.
function escapeHtml(value) {

    return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

function getCurrentUser() {

    $.ajax({

        url: "/api/account/me",

        type: "GET",

        success: function (user) {

            $("#username").text(user.username);
            $("#role").text(user.role);

            userRole = user.role;

            // Only SuperAdmin sees the form right away. Admins get it
            // shown to them only when editing (see editProduct below).
            if (userRole !== "SuperAdmin") {
                $("#addProductCard").hide();
            }

            loadProducts();

        },

        error: function () {

            window.location = "Login.html";

        }

    });

}

function loadProducts() {

    $.ajax({

        url: "/api/product",

        type: "GET",

        success: function (result) {

            allProducts = result;

            let rows = "";

            $.each(result, function (i, item) {

                rows += `
                <tr data-id="${item.id}">

                    <td>${item.id}</td>
                    <td>${escapeHtml(item.name)}</td>
                    <td>${escapeHtml(item.category)}</td>
                    <td>${item.price}</td>
                    <td>${item.quantity}</td>

                    <td>
                        ${
                            (userRole === "SuperAdmin" || userRole === "Admin")
                            ? `<button class="btn btn-warning btn-sm btn-edit">Edit</button>`
                            : ""
                        }
                        ${
                            userRole === "SuperAdmin"
                            ? `<button class="btn btn-danger btn-sm ms-2 btn-delete">Delete</button>`
                            : ""
                        }
                    </td>

                </tr>`;

            });

            $("#products").html(rows);

        },

        error: function () {

            alert("Unable to load products.");

        }

    });

}

// Using event delegation + a lookup by id, instead of passing values
// through the onclick string, so names with quotes/apostrophes don't
// break the page.
$(document).on("click", ".btn-edit", function () {

    const id = $(this).closest("tr").data("id");
    const item = allProducts.find(p => p.id == id);

    if (item) editProduct(item);

});

$(document).on("click", ".btn-delete", function () {

    const id = $(this).closest("tr").data("id");
    deleteProduct(id);

});

function saveProduct() {

    if ($("#name").val() == "" ||
        $("#category").val() == "" ||
        $("#price").val() == "" ||
        $("#quantity").val() == "") {

        alert("Please fill all fields.");
        return;
    }

    if ($("#productId").val() == "") {
        addProduct();
    }
    else {
        updateProduct();
    }

}

//================ ADD PRODUCT ====================

function addProduct() {

    $.ajax({

        url: "/api/product",

        type: "POST",

        contentType: "application/json",

        data: JSON.stringify({

            name: $("#name").val(),
            category: $("#category").val(),
            price: parseFloat($("#price").val()),
            quantity: parseInt($("#quantity").val())

        }),

        success: function () {

            alert("Product Added Successfully");
            clearForm();
            loadProducts();

        },

        error: function () {

            alert("Unable to add product.");

        }

    });

}

//================ EDIT PRODUCT ====================

function editProduct(item) {

    // Admins don't see this form until now - show it, pre-filled.
    $("#addProductCard").show();

    $("#productId").val(item.id);
    $("#name").val(item.name);
    $("#category").val(item.category);
    $("#price").val(item.price);
    $("#quantity").val(item.quantity);

    $("#btnSave").text("Update Product");

}

//================ UPDATE PRODUCT ====================

function updateProduct() {

    var id = $("#productId").val();

    $.ajax({

        url: "/api/product/" + id,

        type: "PUT",

        contentType: "application/json",

        data: JSON.stringify({

            id: id,
            name: $("#name").val(),
            category: $("#category").val(),
            price: parseFloat($("#price").val()),
            quantity: parseInt($("#quantity").val())

        }),

        success: function () {

            alert("Product Updated Successfully");
            clearForm();
            loadProducts();

        },

        error: function () {

            alert("Unable to update product.");

        }

    });

}

//================ DELETE PRODUCT ====================

function deleteProduct(id) {

    if (!confirm("Are you sure you want to delete this product?"))
        return;

    $.ajax({

        url: "/api/product/" + id,

        type: "DELETE",

        success: function () {

            alert("Product Deleted Successfully");
            loadProducts();

        },

        error: function () {

            alert("Unable to delete product.");

        }

    });

}

//================ CLEAR FORM ====================

function clearForm() {

    $("#productId").val("");
    $("#name").val("");
    $("#category").val("");
    $("#price").val("");
    $("#quantity").val("");

    $("#btnSave").text("Save Product");

    // Admins only ever see the form while actively editing.
    if (userRole !== "SuperAdmin") {
        $("#addProductCard").hide();
    }

}

//================ LOGOUT ====================

function logout() {

    $.ajax({

        url: "/api/account/logout",

        type: "POST",

        success: function () {

            window.location = "Login.html";

        }

    });

}

</script>

</body>
</html>
