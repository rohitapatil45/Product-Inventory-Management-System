<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        :root {
            --ink: #1e293b;
            --muted: #64748b;
            --accent: #4f46e5;
            --accent-dark: #4338ca;
            --surface: #ffffff;
            --bg: #f4f6fb;
        }

        html, body {
            height: 100%;
        }

        body {
            background: var(--bg);
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrap {
            width: 100%;
            max-width: 380px;
            padding: 1.5rem;
        }

        .brand {
            text-align: center;
            margin-bottom: 1.75rem;
        }

        .brand .icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: var(--accent);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .brand h2 {
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.15rem;
        }

        .brand p {
            color: var(--muted);
            font-size: 0.9rem;
            margin: 0;
        }

        .card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(30, 41, 59, 0.08);
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--ink);
            margin-bottom: 0.3rem;
        }

        .form-control {
            padding: 0.6rem 0.85rem;
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.15);
        }

        .input-group .btn-outline-secondary {
            border-color: #ced4da;
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            font-weight: 500;
            padding: 0.6rem;
        }

        .btn-primary:hover, .btn-primary:focus {
            background: var(--accent-dark);
            border-color: var(--accent-dark);
        }

        .btn-primary:disabled {
            background: var(--accent);
            opacity: 0.7;
        }

        #errorAlert {
            font-size: 0.875rem;
            padding: 0.6rem 0.85rem;
        }

    </style>

</head>
<body>

<div class="login-wrap">

    <div class="brand">
        <div class="icon"><i class="bi bi-box-seam"></i></div>
        <h2>Welcome back</h2>
        <p>Sign in to Product Inventory Management</p>
    </div>

    <div class="card p-4">

        <div id="errorAlert" class="alert alert-danger d-none" role="alert">
            <div class="d-flex align-items-center gap-2">
                <i class="bi bi-exclamation-circle"></i>
                <span id="errorText">Invalid username or password.</span>
            </div>
        </div>

        <form id="loginForm">

            <div class="mb-3">
                <label for="txtUsername">Username</label>
                <input type="text" class="form-control" id="txtUsername" placeholder="Enter your username" autocomplete="username" autofocus>
            </div>

            <div class="mb-3">
                <label for="txtPassword">Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="txtPassword" placeholder="Enter your password" autocomplete="current-password">
                    <button class="btn btn-outline-secondary" type="button" id="btnTogglePassword" tabindex="-1">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-2" id="btnLogin">
                <span id="btnLoginText">Login</span>
                <span id="btnLoginSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
            </button>

        </form>

    </div>

</div>

<script>

$("#btnTogglePassword").click(function () {

    const field = $("#txtPassword");
    const icon = $(this).find("i");

    if (field.attr("type") === "password") {
        field.attr("type", "text");
        icon.removeClass("bi-eye").addClass("bi-eye-slash");
    } else {
        field.attr("type", "password");
        icon.removeClass("bi-eye-slash").addClass("bi-eye");
    }

});

$("#loginForm").on("submit", function (e) {

    e.preventDefault();

    const username = $("#txtUsername").val().trim();
    const password = $("#txtPassword").val();

    $("#errorAlert").addClass("d-none");

    if (username === "" || password === "") {
        $("#errorText").text("Please enter both username and password.");
        $("#errorAlert").removeClass("d-none");
        return;
    }

    setLoading(true);

    $.ajax({

        url: "/api/account/login",

        type: "POST",

        contentType: "application/json",

        data: JSON.stringify({

            username: username,
            password: password

        }),

        success: function () {

            window.location = "Products.html";

        },

        error: function () {

            $("#errorText").text("Invalid username or password.");
            $("#errorAlert").removeClass("d-none");
            setLoading(false);

        }

    });

});

function setLoading(isLoading) {

    $("#btnLogin").prop("disabled", isLoading);
    $("#btnLoginText").text(isLoading ? "Signing in..." : "Login");
    $("#btnLoginSpinner").toggleClass("d-none", !isLoading);

}

</script>

</body>
</html>
